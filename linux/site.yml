---
- name: Post-install setup
  hosts: localhost
  connection: local
  become: false
  vars:
    profile: server
    # Debian-style architecture name for apt repo URLs (e.g. amd64, arm64).
    deb_arch: "{{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else 'arm64' if ansible_facts['architecture'] == 'aarch64' else ansible_facts['architecture'] }}"
  vars_files:
    - vars/common.yml

  tasks:
    # Loads vars/ubuntu.yml, vars/fedora.yml or vars/macosx.yml by platform.
    - name: Load platform-specific package vars
      ansible.builtin.include_vars: "vars/{{ ansible_facts['distribution'] | lower }}.yml"
      tags: always

    - name: Run shared (cross-platform) tasks
      ansible.builtin.include_tasks: tasks/common.yml
      tags: always

    - name: Run Linux tasks
      ansible.builtin.include_tasks: tasks/linux.yml
      when: ansible_facts['os_family'] != "Darwin"
      tags: always

    - name: Run macOS tasks
      ansible.builtin.include_tasks: tasks/darwin.yml
      when: ansible_facts['os_family'] == "Darwin"
      tags: always
